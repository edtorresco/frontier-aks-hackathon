apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fabtech
  namespace: cluster-config
spec:
  interval: 5m
  targetNamespace: fabtech
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ./Student/Resources/src/manifests/chart
      sourceRef:
        kind: GitRepository
        name: cluster-config
        namespace: cluster-config
  values:
    api:
      image:
        repository: frontieracretcswc.azurecr.io/fabtech-api
        tag: v1
    web:
      image:
        repository: frontieracretcswc.azurecr.io/fabtech-web
        tag: v1
