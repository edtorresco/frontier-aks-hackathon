api:
  image:
    repository: <ACR_LOGIN_SERVER>/fabtech-api
    tag: v1
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    port: 3001
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  secretStore:
    enabled: false
    secretProviderClass: fabtech-secrets

web:
  image:
    repository: <ACR_LOGIN_SERVER>/fabtech-web
    tag: v1
    pullPolicy: IfNotPresent
  replicaCount: 2
  contentApiUrl: http://fabtech-api:3001
  service:
    port: 3000
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Traffic exposure is handled separately — choose one:
#   Option A (Gateway API via App Routing):  kubectl apply -f ../gateway.yaml
#   Option B (Gateway API via AGC):          kubectl apply -f ../agc.yaml
